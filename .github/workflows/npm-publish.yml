name: Publish npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          cd npm
          npm version "$TAG" --no-git-tag-version --allow-same-version
          echo "Publishing version: $TAG"

      - name: Wait for release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET_URL="https://github.com/fanxing-6/ccx/releases/download/${TAG}/ccx_linux_amd64.tar.gz"
          echo "Waiting for asset: $ASSET_URL"
          for i in $(seq 1 30); do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$ASSET_URL")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "Asset available (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Asset not available after 5 minutes"
          exit 1

      - name: Publish to npm
        run: |
          cd npm
          npm publish --provenance --access public
