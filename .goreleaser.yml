version: 2

builds:
  - main: .
    binary: ccx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X ccx/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "ccx_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
